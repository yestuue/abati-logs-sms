<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ABATI LOGS & SMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-wrapper { min-height: 100vh; padding: 140px 24px 80px; }
        .page-container { max-width: 760px; margin: 0 auto; }
        .page-back { display:inline-flex; align-items:center; gap:8px; color:var(--text-muted); font-size:0.9rem; margin-bottom:40px; text-decoration:none; transition:color 0.2s; }
        .page-back:hover { color:var(--accent); }
        .page-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; background:var(--accent-glow); border:1px solid rgba(0,229,160,0.2); border-radius:100px; font-size:0.82rem; color:var(--accent); font-weight:600; margin-bottom:20px; }
        .page-title { font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; margin-bottom:16px; color:var(--text-primary); }
        .page-subtitle { font-size:1.1rem; color:var(--text-muted); margin-bottom:56px; line-height:1.6; }
        .page-content { background:var(--bg-card); border:1px solid var(--border-color); border-radius:20px; padding:48px; }
        .page-content h2 { font-family:'Syne',sans-serif; font-size:1.4rem; margin:32px 0 12px; color:var(--text-primary); }
        .page-content h2:first-child { margin-top:0; }
        .page-content p { color:var(--text-muted); line-height:1.8; margin-bottom:16px; }
        .page-content a { color:var(--accent); }
        .page-content ul { color:var(--text-muted); line-height:2; padding-left:20px; }
        .coming-soon { text-align:center; padding:60px 0; }
        .coming-soon i { font-size:3rem; color:var(--accent); opacity:0.6; display:block; margin-bottom:16px; }
        .coming-soon p { color:var(--text-muted); font-size:1rem; }
        .nav-top { position:fixed; top:0; left:0; width:100%; padding:20px 24px; display:flex; justify-content:space-between; align-items:center; z-index:100; border-bottom:1px solid var(--border-color); background:rgba(26,26,26,0.9); backdrop-filter:blur(10px); }
        body.light-mode .nav-top { background:rgba(245,245,240,0.92); }
        .nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .nav-brand .logo-mark { width:32px; height:32px; }
        .nav-brand .brand-name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; letter-spacing:1px; color:var(--text-primary); }
        .nav-brand .brand-sub { font-size:0.6rem; letter-spacing:2px; color:var(--text-muted); }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="grid-bg"></div>

    <nav class="nav-top">
        <a href="/" class="nav-brand">
            <div class="logo-mark">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 8L9.04907 85H37.9L50 62L62.1 85H90.9509L50 8Z" fill="white"/>
                    <path d="M50 40C45 60 55 70 45 85H65L50 40Z" fill="#1A1A1A"/>
                </svg>
            </div>
            <div class="logo-text">
                <span class="brand-name">ABATI</span>
                <span class="brand-sub">LOGS & SMS</span>
            </div>
        </a>
        <div style="display:flex;gap:12px;align-items:center;">
            <a href="/login.html" class="btn btn-ghost" style="padding:8px 18px;font-size:0.85rem;">Login</a>
            <a href="/register.html" class="btn btn-primary" style="padding:8px 18px;font-size:0.85rem;">Get a Number</a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"><div class="theme-toggle-thumb">🌙</div></button>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="page-container">
            <a href="/" class="page-back"><i class="ph ph-arrow-left"></i> Back to Home</a>
            <div class="page-badge"><i class="ph-fill ph-lock-key"></i> ABATI LOGS & SMS</div>
            <h1 class="page-title">Contact Us</h1>
            <p class="page-subtitle">Get in touch with our team</p>

            <div class="page-content">
                <div class="coming-soon">
                    <i class="ph-fill ph-files"></i>
                    <h2 style="font-family:'Syne',sans-serif;margin-bottom:12px;">Contact Us</h2>
                    <p>This page is being prepared. Check back soon or <a href="/contact.html">contact us</a> for more information.</p>
                    <a href="/" class="btn btn-primary" style="margin-top:24px;display:inline-flex;">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
