<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — ABATI SMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #09090d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 340px; }
    .icon {
      width: 80px; height: 80px;
      background: rgba(0,229,160,0.08);
      border: 1px solid rgba(0,229,160,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: #00E5A0;
    }
    p { color: #888; font-size: .95rem; line-height: 1.6; margin-bottom: 28px; }
    button {
      padding: 13px 28px;
      background: #00E5A0;
      border: none;
      border-radius: 10px;
      color: #09090d;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📵</div>
    <h1>You're offline</h1>
    <p>No internet connection. Check your connection and try again — your data is safe.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
